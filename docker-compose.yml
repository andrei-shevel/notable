# Notable — base compose stack.
#
# Default usage: docker compose up -d
#   Brings up `db` + `api`. `edge` is behind the `prod` profile so the default
#   doesn't try to build static assets.
#
# Dev usage:     docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Adds `mailpit`, source mounts, and exposes db on 127.0.0.1:5432.
#
# Prod usage:    docker compose --profile prod up -d
#   Activates `edge` (the Caddy image bakes in landing + SPA + Caddyfile).
#   Caddy serves the marketing landing at /, the SPA under /app, and proxies
#   /api/* to the api container.

name: notable

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notable
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required, see .env.example}
      POSTGRES_DB: notable
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notable -d notable']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY required, see .env.example}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY required, see .env.example}
      # Backstop for orphaned multipart uploads. The api aborts a failed upload
      # explicitly (see storage.ts put()), but a crash mid-upload would leave an
      # incomplete upload consuming space. MinIO purges incomplete uploads
      # itself — these make that intent explicit and tunable. (MinIO does not
      # support the S3 AbortIncompleteMultipartUpload *lifecycle* action; this
      # native cleanup is its equivalent.) Defaults are 24h / 6h.
      MINIO_API_STALE_UPLOADS_EXPIRY: 24h
      MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL: 6h
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      # Repo-root context so pnpm sees the full workspace; @notable/api
      # depends on @notable/shared as a workspace package.
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://notable:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@db:5432/notable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required, see .env.example}
      SMTP_URL: ${SMTP_URL:?SMTP_URL required, see .env.example}
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM required, see .env.example}
      PUBLIC_URL: ${PUBLIC_URL:?PUBLIC_URL required, see .env.example}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-notable}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY required, see .env.example}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY required, see .env.example}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  edge:
    # Self-contained Caddy image: bakes in the SPA build, the static landing,
    # and the Caddyfile. One artifact for the entire web tier. Build context
    # is the repo root because stage 1 builds the SPA via the pnpm workspace.
    profiles: ['prod']
    build:
      context: .
      dockerfile: apps/edge/Dockerfile
    ports:
      - '80:80'
      - '443:443'
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
    volumes:
      - caddy-data:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  caddy-data:
  minio-data:
