# Notable — dev overrides.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Layers on top of docker-compose.yml:
# - exposes Postgres on 127.0.0.1:5432 for psql / GUI clients
# - exposes the api on 127.0.0.1:3000 so the host's Vite dev server can proxy
#   /api/* to it (in prod Caddy handles this hop on the compose network)
# - adds mailpit (catches all outbound mail; UI at http://localhost:8025)
# - points the api at mailpit's SMTP listener
# - mounts api source so tsx watch can hot-reload

services:
  db:
    ports:
      - '127.0.0.1:5432:5432'

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '127.0.0.1:1025:1025' # SMTP
      - '127.0.0.1:8025:8025' # web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 'true'
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
    restart: unless-stopped

  minio:
    ports:
      - '127.0.0.1:9000:9000' # S3 API
      - '127.0.0.1:9001:9001' # web console

  api:
    command: ['sh', '-c', 'pnpm run db:migrate && pnpm run dev']
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: development
      # Route outbound mail to mailpit on the compose network.
      SMTP_URL: smtp://mailpit:1025
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
    volumes:
      # Bind the api source plus every workspace package it depends on so
      # edits hot-reload. Anonymous volumes preserve node_modules (and pnpm's
      # symlink farms) from being shadowed by the bind mounts.
      - ./apps/api:/repo/apps/api
      - ./packages/editor:/repo/packages/editor
      - ./packages/shared:/repo/packages/shared
      - /repo/node_modules
      - /repo/apps/api/node_modules
      - /repo/packages/editor/node_modules
      - /repo/packages/shared/node_modules
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio:
        condition: service_started
